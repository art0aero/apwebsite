        const SUPABASE_URL = 'https://dvszkmkxamilxocawbml.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_IPiv65AiEjXlmbebq-3jOQ_aVR-5_RY';
        
        // Initialize Supabase client
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Global state
        let currentUser = null;

        // Auth state listener
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' && session?.user) {
                currentUser = session.user;
                console.log('User signed in:', currentUser.email);
            } else if (event === 'SIGNED_OUT') {
                currentUser = null;
                console.log('User signed out');
            }

            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session?.user) {
                currentUser = session.user;
                return true;
            }
            return false;
        }

            // PART 6: C2 Level (Questions 45-50)

            { id: 46, level: "C2", question: "Identify the error (if any): \"The data, which was carefully collected by the researchers over a three-year period, were analyzed extensively.\"", options: ["which was should be which were", "were analyzed should be was analyzed", "carefully collected should be careful collected", "No error"], correct: 3 },
            { id: 47, level: "C2", question: "What is the meaning of \"ephemeral\"?", options: ["Eternal", "Lasting for a very short time", "Extremely important", "Gradually developing"], correct: 1 },
            { id: 48, level: "C2", question: "Choose the word that best completes: \"Her ______ manner made everyone feel comfortable immediately.\"", options: ["abrasive", "affable", "ambiguous", "austere"], correct: 1 },
            { id: 49, level: "C2", question: "What does \"zeitgeist\" refer to?", options: ["A specific historical event", "The general mood or spirit of a particular period", "A type of philosophy", "An economic theory"], correct: 1 },

        ];

        // Level order for calculations
        const LEVEL_ORDER = ["A1", "A2", "B1", "B2", "C1", "C2"];
        const LEVEL_WEIGHTS = [1, 2, 4, 8, 16, 32]; // Exponential weights
        const LEVEL_BOUNDARIES = [0.08, 0.20, 0.35, 0.50, 0.70, 0.90];

    <!-- JavaScript Logic & Integrations -->
    <script>
        const sampleQuestions = [
            {
                id: 1,
                level: "A1",
                question: "Choose the correct verb form: \"She ______ to school by bus.\"",
                options: ["go", "goes", "going", "gone"],
                correct: 1
            },
            {
                id: 9,
                level: "A2",
                question: "Select the correct comparative: \"This book is ______ than that one.\"",
                options: ["more good", "gooder", "better", "more better"],
                correct: 2
            },
            {
                id: 27,
                level: "B2",
                question: "Select the correct relative pronoun: \"The artist ______ paintings were stolen has been found.\"",
                options: ["who", "which", "whose", "whom"],
                correct: 2
            },
            {
                id: 42,
                level: "C1",
                question: "Which phrase best completes the sentence? \"The committee decided to ______ the new policy immediately.\"",
                options: ["put up with", "bring about", "implement", "get over"],
                correct: 2
            }
        ];
        
        let testQuestions = [...allQuestions]; // Default to all 50 questions
        let currentQuestionIndex = 0;
        let userAnswers = new Array(testQuestions.length).fill(null);
        let timerInterval;
        let secondsElapsed = 0;

        // Check auth on page load
        window.addEventListener('DOMContentLoaded', async () => {
            // Handle OAuth redirect - check for hash in URL
            if (window.location.hash) {
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                const accessToken = hashParams.get('access_token');
                
                if (accessToken) {
                    console.log('OAuth redirect detected, processing...');
                    // Set session from URL hash
                    const { data: { session }, error } = await supabaseClient.auth.getSession();
                    if (error) {
                        console.error('OAuth session error:', error);
                    } else if (session) {
                        currentUser = session.user;
                        document.getElementById('results-link').classList.remove('hidden');
                        // Clean up URL
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                }
            }
            
            const isLoggedIn = await checkAuth();
            if (isLoggedIn) {
                console.log('User already logged in:', currentUser.email);
                document.getElementById('results-link').classList.remove('hidden');
                // Check for saved progress
                const savedProgress = loadTestProgress();
                if (savedProgress && savedProgress.userEmail === currentUser.email) {
                    // Restore progress
                    currentQuestionIndex = savedProgress.currentQuestionIndex;
                    userAnswers = savedProgress.userAnswers;
                    secondsElapsed = savedProgress.secondsElapsed || 0;
                    console.log('Restored progress: question', currentQuestionIndex + 1, 'of', testQuestions.length);
                    showSection('test-section');
                    initTest(false); // Don't reset, use restored state
                } else {
                    // No saved progress, start fresh
                    showSection('test-section');
                    initTest(true);
                }
            }
        });

        // Save test progress to localStorage
        function saveTestProgress() {
            if (currentUser) {
                const progress = {
                    userEmail: currentUser.email,
                    currentQuestionIndex: currentQuestionIndex,
                    userAnswers: userAnswers,
                    secondsElapsed: secondsElapsed,
                    savedAt: new Date().toISOString()
                };
                localStorage.setItem('testProgress', JSON.stringify(progress));
                console.log('Progress saved');
            }
        }

        // Load test progress from localStorage
        function loadTestProgress() {
            try {
                const saved = localStorage.getItem('testProgress');
                return saved ? JSON.parse(saved) : null;
            } catch (e) {
                console.error('Error loading progress:', e);
                return null;
            }
        }

        // Clear test progress from localStorage
        function clearTestProgress() {
            localStorage.removeItem('testProgress');
            console.log('Progress cleared');
        }

        function showSection(id) {
            ['auth-section', 'test-section', 'results-section'].forEach(sec => {
                document.getElementById(sec).classList.add('hidden');
            });
            const target = document.getElementById(id);
            target.classList.remove('hidden');
            
            target.classList.remove('fade-in');
            void target.offsetWidth; 
            target.classList.add('fade-in');
        }

        function switchAuthTab(tab) {
            const loginBtn = document.getElementById('tab-login');
            const regBtn = document.getElementById('tab-register');
            const formLogin = document.getElementById('form-login');
            const formReg = document.getElementById('form-register');
            const errorDiv = document.getElementById('auth-error');

            // Clear error messages
            errorDiv.classList.add('hidden');
            errorDiv.textContent = '';

            if (tab === 'login') {
                loginBtn.className = "flex-1 py-2 text-xs uppercase tracking-widest font-semibold bg-white/10 text-white rounded-md transition-all border border-white/5";
                regBtn.className = "flex-1 py-2 text-xs uppercase tracking-widest font-semibold text-neutral-400 hover:text-white rounded-md transition-all";
                formLogin.classList.remove('hidden');
                formReg.classList.add('hidden');
                // Clear register form
                document.getElementById('form-register').reset();
            } else {
                regBtn.className = "flex-1 py-2 text-xs uppercase tracking-widest font-semibold bg-white/10 text-white rounded-md transition-all border border-white/5";
                loginBtn.className = "flex-1 py-2 text-xs uppercase tracking-widest font-semibold text-neutral-400 hover:text-white rounded-md transition-all";
                formReg.classList.remove('hidden');
                formLogin.classList.add('hidden');
                // Clear login form
                document.getElementById('form-login').reset();
            }
        }

        function checkStrength() {
            const pw = document.getElementById('reg-password').value;
            const str1 = document.getElementById('str-1');
            const str2 = document.getElementById('str-2');
            const str3 = document.getElementById('str-3');
            
            let strength = 0;
            if (pw.length >= 8) strength++;
            if (pw.match(/[A-Z]/) && pw.match(/[0-9]/)) strength++;
            if (pw.match(/[^A-Za-z0-9]/)) strength++;

            str1.className = `h-1 flex-1 rounded-full transition-colors ${strength >= 1 ? 'bg-[#f19737]' : 'bg-white/10'}`;
            str2.className = `h-1 flex-1 rounded-full transition-colors ${strength >= 2 ? 'bg-[#fea0da]' : 'bg-white/10'}`;
            str3.className = `h-1 flex-1 rounded-full transition-colors ${strength >= 3 ? 'bg-[#215fc3]' : 'bg-white/10'}`;
        }

        async function handleLogin(e) {
            e.preventDefault();
            const form = e.target;
            const email = form.querySelector('input[type="email"]').value;
            const password = form.querySelector('input[type="password"]').value;
            const errorDiv = document.getElementById('auth-error');

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;

                currentUser = data.user;
                console.log('Logged in:', currentUser.email);
                document.getElementById('results-link').classList.remove('hidden');
                showSection('test-section');
                initTest();
            } catch (error) {
                errorDiv.textContent = error.message === 'Invalid login credentials'
                    ? 'Неверный email или пароль'
                    : error.message;
                errorDiv.classList.remove('hidden');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const pw = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;
            const email = document.querySelector('#form-register input[type="email"]').value;
            const errorDiv = document.getElementById('auth-error');

            // Validation
            if (pw.length < 8) {
                errorDiv.textContent = 'Пароль должен быть не менее 8 символов';
                errorDiv.classList.remove('hidden');
                return;
            }
            if (pw !== confirm) {
                errorDiv.textContent = 'Пароли не совпадают';
                errorDiv.classList.remove('hidden');
                return;
            }

            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: pw
                });

                if (error) throw error;

                currentUser = data.user;
                console.log('Registered:', currentUser.email);
                
                // Check if email confirmation is required
                if (data.user?.identities?.length === 0) {
                    errorDiv.textContent = 'Такой аккаунт уже существует. Пожалуйста, войдите.';
                    errorDiv.classList.remove('hidden');
                    switchAuthTab('login');
                    return;
                }

                alert('Пожалуйста, проверьте email для подтверждения регистрации.');
                document.getElementById('results-link').classList.remove('hidden');
                showSection('test-section');
                initTest();
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('hidden');
            }
        }

        async function signInWithProvider(provider) {
            try {
                const { error } = await supabaseClient.auth.signInWithOAuth({
                    provider: provider,
                    options: {
                        redirectTo: window.location.href.split('#')[0] // Remove hash from current URL
                    }
                });
                if (error) throw error;
            } catch (error) {
                const errorDiv = document.getElementById('auth-error');
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('hidden');
            }
        }

        async function signOut() {
            await supabaseClient.auth.signOut();
            currentUser = null;
            showSection('auth-section');
        }

        function initTest(reset = true) {
            // Use all 50 questions
            testQuestions = [...allQuestions];
            document.getElementById('q-total').textContent = testQuestions.length;
            
            if (reset) {
                currentQuestionIndex = 0;
                userAnswers = new Array(testQuestions.length).fill(null);
                secondsElapsed = 0;
                clearTestProgress();
            }

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                secondsElapsed++;
                const m = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
                const s = (secondsElapsed % 60).toString().padStart(2, '0');
                document.getElementById('timer').textContent = `${m}:${s}`;
            }, 1000);

            renderQuestion();
        }

        function renderQuestion() {
            const q = testQuestions[currentQuestionIndex];
            
            document.getElementById('q-current').textContent = currentQuestionIndex + 1;
            document.getElementById('q-level').textContent = q.level;
            
            const progress = ((currentQuestionIndex) / testQuestions.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;

            document.getElementById('question-text').textContent = q.question;

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options.forEach((opt, idx) => {
                const isChecked = userAnswers[currentQuestionIndex] === idx ? 'checked' : '';
                const html = `
                    <label class="relative flex items-center cursor-pointer rounded-2xl border border-white/10 bg-white/5 p-6 md:p-8 hover:bg-white/10 hover:border-white/20 transition-all group overflow-hidden">
                        <input type="radio" name="answer" value="${idx}" class="peer sr-only" onchange="selectAnswer(${idx})" ${isChecked}>
                        <span class="flex flex-1 relative z-10 text-lg md:text-xl font-light text-neutral-300 peer-checked:text-white transition-colors">${opt}</span>
                        <iconify-icon icon="solar:check-circle-bold" class="relative z-10 hidden peer-checked:block text-[#f19737] transition-opacity ml-4" width="24"></iconify-icon>
                        <span class="pointer-events-none absolute inset-0 rounded-2xl border-2 border-transparent peer-checked:border-[#f19737]/50 transition-all z-10" aria-hidden="true"></span>
                    </label>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });

            document.getElementById('btn-prev').disabled = currentQuestionIndex === 0;
            checkNextButton();
        }

        function selectAnswer(idx) {
            userAnswers[currentQuestionIndex] = idx;
            checkNextButton();
            // Auto-save progress after each answer
            saveTestProgress();
        }

        function checkNextButton() {
            const btn = document.getElementById('btn-next');
            if (userAnswers[currentQuestionIndex] !== null) {
                btn.disabled = false;
                btn.innerHTML = currentQuestionIndex === testQuestions.length - 1 
                    ? `Завершить <iconify-icon icon="solar:flag-linear" width="18" stroke-width="1.5"></iconify-icon>`
                    : `Далее <iconify-icon icon="solar:arrow-right-linear" width="18" stroke-width="1.5"></iconify-icon>`;
            } else {
                btn.disabled = true;
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < testQuestions.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
            } else {
                finishTest();
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion();
            }
        }

        function calculateLevel(answers) {
            // Count correct answers per level
            const levelScores = { A1: { correct: 0, total: 0 }, A2: { correct: 0, total: 0 }, B1: { correct: 0, total: 0 }, B2: { correct: 0, total: 0 }, C1: { correct: 0, total: 0 }, C2: { correct: 0, total: 0 } };

            answers.forEach((ans, idx) => {
                const q = testQuestions[idx];
                if (levelScores[q.level]) {
                    levelScores[q.level].total++;
                    if (ans === q.correct) {
                        levelScores[q.level].correct++;
                    }
                }
            });

            // Calculate percentages for each level
            const percentages = LEVEL_ORDER.map(lvl => {
                const score = levelScores[lvl];
                return score.total > 0 ? (score.correct / score.total) * 100 : 0;
            });

            /*
            CEFR Calculation Algorithm (Exponential Weights with Cumulative Minimum):
            - Weights: A1=1, A2=2, B1=4, B2=8, C1=16, C2=32
            - Formula: score = Σ[min(%current, %all_below) × weight] / Σweights
            - Boundaries: 0.08=A1, 0.20=A2, 0.35=B1, 0.50=B2, 0.70=C1, 0.90=C2, 1.00=C2
            */

            // Calculate cumulative minimum (foundation must be solid)
            const effectiveScores = [];
            let currentMin = 100;
            for (const p of percentages) {
                currentMin = Math.min(currentMin, p);
                effectiveScores.push(currentMin);
            }

            // Weighted sum
            const weights = LEVEL_WEIGHTS;
            const weightedSum = effectiveScores.reduce((sum, score, i) => sum + score * weights[i], 0);
            const maxPossible = weights.reduce((sum, w) => sum + 100 * w, 0);
            const normalized = weightedSum / maxPossible;

            // Determine level based on boundaries
            const boundaries = LEVEL_BOUNDARIES;
            const levels = ["A1", "A2", "B1", "B2", "C1", "C2"];
            let finalLevel = "C2";
            
            for (let i = 0; i < boundaries.length; i++) {
                if (normalized < boundaries[i]) {
                    finalLevel = i === 0 ? "Below A1" : levels[i - 1];
                    break;
                }
            }

            // Calculate overall percentage for display
            const totalCorrect = answers.filter((ans, idx) => ans === testQuestions[idx].correct).length;
            const overallPercentage = Math.round((totalCorrect / testQuestions.length) * 100);

            // Level descriptions
            const levelDescriptions = {
                "Below A1": "Beginner",
                "A1": "Elementary",
                "A2": "Pre-Intermediate",
                "B1": "Intermediate",
                "B2": "Upper-Intermediate",
                "C1": "Advanced",
                "C2": "Proficiency"
            };

            return {
                percentage: overallPercentage,
                normalizedScore: normalized,
                badge: `${finalLevel} - ${levelDescriptions[finalLevel] || ""}`,
                level: finalLevel,
                breakdown: LEVEL_ORDER.reduce((acc, lvl) => {
                    acc[lvl] = Math.round(percentages[LEVEL_ORDER.indexOf(lvl)]);
                    return acc;
                }, {})
            };
        }

        async function finishTest() {
            clearInterval(timerInterval);
            const results = calculateLevel(userAnswers);

            document.getElementById('res-level-badge').textContent = results.badge;

            const circle = document.getElementById('res-circle');
            const offset = 282.7 - (282.7 * results.percentage) / 100;

            // Save results to Supabase first
            if (currentUser) {
                try {
                    const { error } = await supabaseClient.from('test_results').insert({
                        user_id: currentUser.id,
                        user_email: currentUser.email,
                        answers: userAnswers,
                        score: results.percentage,
                        normalized_score: results.normalizedScore,
                        level: results.level,
                        level_badge: results.badge,
                        breakdown: results.breakdown,
                        time_seconds: secondsElapsed,
                        completed_at: new Date().toISOString()
                    });

                    if (error) {
                        console.error('Error saving results:', error);
                    } else {
                        console.log('Results saved successfully');
                    }
                } catch (error) {
                    console.error('Error saving results:', error);
                }
            }

            // Clear progress only after results are saved
            clearTestProgress();

            showSection('results-section');

            setTimeout(() => {
                circle.style.strokeDashoffset = offset;
                animateValue("res-score-text", 0, results.percentage, 1000);
            }, 100);

            const bdContainer = document.getElementById('res-breakdown');
            bdContainer.innerHTML = '';

            Object.entries(results.breakdown).forEach(([lvl, val]) => {
                const html = `
                    <div class="flex items-center gap-4">
                        <span class="w-8 text-sm font-semibold text-white/50 tracking-widest">${lvl}</span>
                        <div class="flex-1 h-2 bg-white/5 rounded-full overflow-hidden">
                            <div class="h-full bg-gradient-to-r from-[#215fc3] via-[#fea0da] to-[#f19737] rounded-full transition-all duration-1000" style="width: 0%" data-target="${val}%"></div>
                        </div>
                        <span class="w-12 text-right text-sm font-light text-white">${val}%</span>
                    </div>
                `;
                bdContainer.insertAdjacentHTML('beforeend', html);
            });

            setTimeout(() => {
                bdContainer.querySelectorAll('[data-target]').forEach(bar => {
                    bar.style.width = bar.getAttribute('data-target');
                });
            }, 300);
        }

        function goToHome() {
            // Just navigate to home without clearing progress
            showSection('auth-section');
        }

        function resetTest() {
            // Reset all state
            currentQuestionIndex = 0;
            userAnswers = new Array(allQuestions.length).fill(null);
            secondsElapsed = 0;
            clearInterval(timerInterval);

            // Clear saved progress
            clearTestProgress();

            // Clear auth forms for security
            document.getElementById('form-login').reset();
            document.getElementById('form-register').reset();
            document.getElementById('auth-error').classList.add('hidden');

            // Reset UI
            document.getElementById('res-circle').style.strokeDashoffset = 282.7;
            document.getElementById('res-score-text').textContent = '0%';
            document.getElementById('timer').textContent = '00:00';

            showSection('auth-section');
        }

        function animateValue(id, start, end, duration) {
            if (start === end) return;
            var range = end - start;
            var current = start;
            var increment = end > start? 1 : -1;
            var stepTime = Math.abs(Math.floor(duration / range));
            var obj = document.getElementById(id);
            var timer = setInterval(function() {
                current += increment;
                obj.innerHTML = current + "%";
                if (current == end) {
                    clearInterval(timer);
                }
            }, stepTime);
        }

        window.addEventListener('beforeunload', function (e) {
            if (!document.getElementById('test-section').classList.contains('hidden')) {
                e.preventDefault();
                e.returnValue = '';
            }
        });
    </script>
