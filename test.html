        <!-- ================= SECTION C: RESULTS ================= -->

                                    <stop offset="100%" stop-color="#fea0da"></stop>

    <!-- Supabase Integration -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="shared/auth.js"></script>

    <script>
        const TEST_QUESTION_COUNT = 50;

        let authController = null;
        let currentUser = null;
        let testQuestions = [];
        let currentQuestionIndex = 0;
        let userAnswers = [];
        let timerInterval;
        let secondsElapsed = 0;

        function normalizeQuestion(rawQuestion) {
            const normalized = {
                id: Number(rawQuestion?.id),
                level: String(rawQuestion?.level || '').trim(),
                question: String(rawQuestion?.question || rawQuestion?.question_text || '').trim(),
                options: Array.isArray(rawQuestion?.options)
                    ? rawQuestion.options.map((option) => String(option))
                    : []
            };

            if (!Number.isInteger(normalized.id) || normalized.id <= 0) return null;
            if (!normalized.level || !normalized.question) return null;
            if (normalized.options.length !== 4) return null;

            const uniqueOptions = new Set(normalized.options.map((value) => value.toLowerCase()));
            if (uniqueOptions.size !== 4) return null;

            return normalized;
        }

        function isValidSavedProgress(saved) {
            if (!saved || typeof saved !== 'object') return false;
            if (!Array.isArray(saved.testQuestions) || saved.testQuestions.length === 0) return false;
            if (!Array.isArray(saved.userAnswers)) return false;
            if (!Number.isInteger(saved.currentQuestionIndex)) return false;
            if (!Number.isFinite(saved.secondsElapsed) || saved.secondsElapsed < 0) return false;

            const normalizedQuestions = saved.testQuestions.map(normalizeQuestion).filter(Boolean);
            if (normalizedQuestions.length !== saved.testQuestions.length) return false;
            if (saved.userAnswers.length !== normalizedQuestions.length) return false;
            if (saved.currentQuestionIndex < 0 || saved.currentQuestionIndex >= normalizedQuestions.length) return false;

            return true;
        }

        function saveTestProgress() {
            try {
                const progress = {
                    currentQuestionIndex,
                    userAnswers,
                    testQuestions,
                    secondsElapsed,
                    timestamp: Date.now()
                };
                localStorage.setItem('testProgress', JSON.stringify(progress));
            } catch (error) {
                console.error('Error saving progress:', error);
            }
        }

        function loadTestProgress() {
            try {
                const saved = localStorage.getItem('testProgress');
                if (!saved) return null;
                return JSON.parse(saved);
            } catch (error) {
                console.error('Error loading progress:', error);
                return null;
            }
        }

        function clearTestProgress() {
            localStorage.removeItem('testProgress');
        }

        function showSection(id) {
            ['auth-section', 'test-section', 'results-section'].forEach((sec) => {
                document.getElementById(sec).classList.add('hidden');
            });
            const target = document.getElementById(id);
            target.classList.remove('hidden');
            target.classList.remove('fade-in');
            void target.offsetWidth;
            target.classList.add('fade-in');
        }

        function switchAuthTab(tab) {
            const loginBtn = document.getElementById('tab-login');
            const regBtn = document.getElementById('tab-register');
            const formLogin = document.getElementById('form-login');
            const formReg = document.getElementById('form-register');
            const errorDiv = document.getElementById('auth-error');

            errorDiv.classList.add('hidden');
            errorDiv.textContent = '';

            if (tab === 'login') {
                loginBtn.className = "flex-1 py-2 text-xs uppercase tracking-widest font-semibold bg-white/10 text-white rounded-md transition-all border border-white/5";
                regBtn.className = "flex-1 py-2 text-xs uppercase tracking-widest font-semibold text-neutral-400 hover:text-white rounded-md transition-all";
                formLogin.classList.remove('hidden');
                formReg.classList.add('hidden');
                document.getElementById('form-register').reset();
            } else {
                regBtn.className = "flex-1 py-2 text-xs uppercase tracking-widest font-semibold bg-white/10 text-white rounded-md transition-all border border-white/5";
                loginBtn.className = "flex-1 py-2 text-xs uppercase tracking-widest font-semibold text-neutral-400 hover:text-white rounded-md transition-all";
                formReg.classList.remove('hidden');
                formLogin.classList.add('hidden');
                document.getElementById('form-login').reset();
            }
        }

        function checkStrength() {
            const pw = document.getElementById('reg-password').value;
            const str1 = document.getElementById('str-1');
            const str2 = document.getElementById('str-2');
            const str3 = document.getElementById('str-3');

            let strength = 0;
            if (pw.length >= 8) strength++;
            if (pw.match(/[A-Z]/) && pw.match(/[0-9]/)) strength++;
            if (pw.match(/[^A-Za-z0-9]/)) strength++;

            str1.className = `h-1 flex-1 rounded-full transition-colors ${strength >= 1 ? 'bg-[#f19737]' : 'bg-white/10'}`;
            str2.className = `h-1 flex-1 rounded-full transition-colors ${strength >= 2 ? 'bg-[#fea0da]' : 'bg-white/10'}`;
            str3.className = `h-1 flex-1 rounded-full transition-colors ${strength >= 3 ? 'bg-[#215fc3]' : 'bg-white/10'}`;
        }

        async function handleLogin(e) {
            e.preventDefault();
            const form = e.target;
            const email = form.querySelector('input[type="email"]').value;
            const password = form.querySelector('input[type="password"]').value;
            const errorDiv = document.getElementById('auth-error');

            try {
                currentUser = await authController.login(email, password);
                document.getElementById('results-link').classList.remove('hidden');
                showSection('test-section');
                await startFreshTest();
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('hidden');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const email = document.querySelector('#form-register input[type="email"]').value;
            const pw = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;
            const errorDiv = document.getElementById('auth-error');

            try {
                const result = await authController.register(email, pw, confirm);

                if (result.needsEmailConfirmation) {
                    errorDiv.textContent = 'Подтвердите email для входа. Проверьте почту.';
                    errorDiv.classList.remove('hidden');
                    return;
                }

                if (result.alreadyExists) {
                    errorDiv.textContent = 'Такой аккаунт уже существует. Пожалуйста, войдите.';
                    errorDiv.classList.remove('hidden');
                    switchAuthTab('login');
                    return;
                }

                currentUser = result.user;
                document.getElementById('results-link').classList.remove('hidden');
                showSection('test-section');
                await startFreshTest();
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('hidden');
            }
        }

        async function signInWithProvider(provider) {
            const errorDiv = document.getElementById('auth-error');
            try {
                await authController.oauth(provider);
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('hidden');
            }
        }

        async function signOut() {
            await authController.signOut();
            currentUser = null;
            showSection('auth-section');
        }

        async function fetchQuestionsFromServer() {
            const accessToken = await authController.getAccessToken();
            if (!accessToken) {
                throw new Error('Сессия истекла. Войдите снова.');
            }

            const response = await fetch(`${window.AppAuth.SUPABASE_URL}/functions/v1/get-test-questions`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    apikey: window.AppAuth.SUPABASE_ANON_KEY,
                    Authorization: `Bearer ${accessToken}`
                },
                body: JSON.stringify({ count: TEST_QUESTION_COUNT })
            });

            const result = await response.json();
            if (!response.ok) {
                throw new Error(result.error || 'Не удалось загрузить вопросы');
            }

            const normalized = Array.isArray(result.questions)
                ? result.questions.map(normalizeQuestion).filter(Boolean)
                : [];

            if (normalized.length !== TEST_QUESTION_COUNT) {
                throw new Error(`Ожидалось ${TEST_QUESTION_COUNT} вопросов, получено ${normalized.length}`);
            }

            return normalized;
        }

        async function startFreshTest() {
            testQuestions = await fetchQuestionsFromServer();
            initTest(true);
        }

        function initTest(reset = true) {
            if (!Array.isArray(testQuestions) || testQuestions.length === 0) {
                throw new Error('Набор вопросов пуст');
            }

            document.getElementById('q-total').textContent = testQuestions.length;

            if (reset) {
                currentQuestionIndex = 0;
                userAnswers = new Array(testQuestions.length).fill(null);
                secondsElapsed = 0;
                clearTestProgress();
            } else if (!Array.isArray(userAnswers) || userAnswers.length !== testQuestions.length) {
                userAnswers = new Array(testQuestions.length).fill(null);
            }

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                secondsElapsed++;
                const m = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
                const s = (secondsElapsed % 60).toString().padStart(2, '0');
                document.getElementById('timer').textContent = `${m}:${s}`;
            }, 1000);

            renderQuestion();
        }

        function renderQuestion() {
            const q = testQuestions[currentQuestionIndex];
            document.getElementById('q-current').textContent = currentQuestionIndex + 1;
            document.getElementById('q-level').textContent = q.level;
            const progress = (currentQuestionIndex / testQuestions.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            document.getElementById('question-text').textContent = q.question;

            const container = document.getElementById('options-container');
            container.innerHTML = '';

            q.options.forEach((opt, idx) => {
                const label = document.createElement('label');
                label.className = 'relative flex items-center cursor-pointer rounded-2xl border border-white/10 bg-white/5 p-6 md:p-8 hover:bg-white/10 hover:border-white/20 transition-all group overflow-hidden';

                const input = document.createElement('input');
                input.type = 'radio';
                input.name = 'answer';
                input.value = String(idx);
                input.className = 'peer sr-only';
                if (userAnswers[currentQuestionIndex] === idx) {
                    input.checked = true;
                }
                input.addEventListener('change', () => selectAnswer(idx));

                const textSpan = document.createElement('span');
                textSpan.className = 'flex flex-1 relative z-10 text-lg md:text-xl font-light text-neutral-300 peer-checked:text-white transition-colors';
                textSpan.textContent = opt;

                const icon = document.createElement('iconify-icon');
                icon.setAttribute('icon', 'solar:check-circle-bold');
                icon.setAttribute('width', '24');
                icon.className = 'relative z-10 hidden peer-checked:block text-[#f19737] transition-opacity ml-4';

                const border = document.createElement('span');
                border.className = 'pointer-events-none absolute inset-0 rounded-2xl border-2 border-transparent peer-checked:border-[#f19737]/50 transition-all z-10';
                border.setAttribute('aria-hidden', 'true');

                label.appendChild(input);
                label.appendChild(textSpan);
                label.appendChild(icon);
                label.appendChild(border);
                container.appendChild(label);
            });

            document.getElementById('btn-prev').disabled = currentQuestionIndex === 0;
            checkNextButton();
        }

        function selectAnswer(idx) {
            userAnswers[currentQuestionIndex] = idx;
            checkNextButton();
            saveTestProgress();
        }

        function checkNextButton() {
            const btn = document.getElementById('btn-next');
            if (userAnswers[currentQuestionIndex] !== null) {
                btn.disabled = false;
                btn.innerHTML = currentQuestionIndex === testQuestions.length - 1
                    ? `Завершить <iconify-icon icon="solar:flag-linear" width="18" stroke-width="1.5"></iconify-icon>`
                    : `Далее <iconify-icon icon="solar:arrow-right-linear" width="18" stroke-width="1.5"></iconify-icon>`;
            } else {
                btn.disabled = true;
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < testQuestions.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
            } else {
                finishTest();
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion();
            }
        }

        async function submitTestToServer() {
            const accessToken = await authController.getAccessToken();
            if (!accessToken) {
                throw new Error('Сессия истекла. Войдите снова.');
            }

            const payload = {
                answers: testQuestions.map((q, idx) => ({
                    question_id: q.id,
                    selected_option: userAnswers[idx]
                })),
                time_seconds: secondsElapsed,
                client_meta: {
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    user_agent: navigator.userAgent
                }
            };

            const response = await fetch(`${window.AppAuth.SUPABASE_URL}/functions/v1/submit-test`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    apikey: window.AppAuth.SUPABASE_ANON_KEY,
                    Authorization: `Bearer ${accessToken}`
                },
                body: JSON.stringify(payload)
            });

            const result = await response.json();
            if (!response.ok) {
                throw new Error(result.error || 'Не удалось отправить результаты теста');
            }
            return result;
        }

        async function finishTest() {
            clearInterval(timerInterval);

            try {
                const result = await submitTestToServer();
                document.getElementById('res-level-badge').textContent = result.level_badge;

                const circle = document.getElementById('res-circle');
                const offset = 282.7 - (282.7 * result.score) / 100;

                clearTestProgress();
                showSection('results-section');

                setTimeout(() => {
                    circle.style.strokeDashoffset = offset;
                    animateValue('res-score-text', 0, result.score, 1000);
                }, 100);

                const bdContainer = document.getElementById('res-breakdown');
                bdContainer.innerHTML = '';

                Object.entries(result.breakdown || {}).forEach(([level, value]) => {
                    const row = document.createElement('div');
                    row.className = 'flex items-center gap-4';

                    const levelLabel = document.createElement('span');
                    levelLabel.className = 'w-8 text-sm font-semibold text-white/50 tracking-widest';
                    levelLabel.textContent = level;

                    const progressWrap = document.createElement('div');
                    progressWrap.className = 'flex-1 h-2 bg-white/5 rounded-full overflow-hidden';

                    const progressFill = document.createElement('div');
                    progressFill.className = 'h-full bg-gradient-to-r from-[#215fc3] via-[#fea0da] to-[#f19737] rounded-full transition-all duration-1000';
                    progressFill.style.width = '0%';
                    progressFill.setAttribute('data-target', `${value}%`);

                    const valueLabel = document.createElement('span');
                    valueLabel.className = 'w-12 text-right text-sm font-light text-white';
                    valueLabel.textContent = `${value}%`;

                    progressWrap.appendChild(progressFill);
                    row.appendChild(levelLabel);
                    row.appendChild(progressWrap);
                    row.appendChild(valueLabel);
                    bdContainer.appendChild(row);
                });

                setTimeout(() => {
                    bdContainer.querySelectorAll('[data-target]').forEach((bar) => {
                        bar.style.width = bar.getAttribute('data-target');
                    });
                }, 300);
            } catch (error) {
                const errorDiv = document.getElementById('auth-error');
                errorDiv.textContent = error.message || 'Не удалось завершить тест';
                errorDiv.classList.remove('hidden');
                showSection('auth-section');
            }
        }

        function goToHome() {
            showSection('auth-section');
        }

        function resetTest() {
            currentQuestionIndex = 0;
            testQuestions = [];
            userAnswers = [];
            secondsElapsed = 0;
            clearInterval(timerInterval);

            clearTestProgress();
            document.getElementById('form-login').reset();
            document.getElementById('form-register').reset();
            document.getElementById('auth-error').classList.add('hidden');
            document.getElementById('res-circle').style.strokeDashoffset = 282.7;
            document.getElementById('res-score-text').textContent = '0%';
            document.getElementById('timer').textContent = '00:00';

            showSection('auth-section');
        }

        function animateValue(id, start, end, duration) {
            if (start === end) return;
            const range = end - start;
            let current = start;
            const increment = end > start ? 1 : -1;
            const stepTime = Math.abs(Math.floor(duration / Math.abs(range || 1)));
            const obj = document.getElementById(id);
            const timer = setInterval(() => {
                current += increment;
                obj.textContent = `${current}%`;
                if (current === end) {
                    clearInterval(timer);
                }
            }, stepTime);
        }

        window.addEventListener('DOMContentLoaded', async () => {
            authController = window.AppAuth.createAuthController({
                redirectPath: '/test.html',
                emailRedirectPath: '/test.html',
                onSignedIn: (user) => {
                    currentUser = user;
                    document.getElementById('results-link').classList.remove('hidden');
                },
                onSignedOut: () => {
                    currentUser = null;
                    document.getElementById('results-link').classList.add('hidden');
                }
            });

            try {
                const user = await authController.init();
                if (user) {
                    const savedProgress = loadTestProgress();
                    showSection('test-section');

                    if (isValidSavedProgress(savedProgress)) {
                        testQuestions = savedProgress.testQuestions.map(normalizeQuestion).filter(Boolean);
                        currentQuestionIndex = savedProgress.currentQuestionIndex;
                        userAnswers = savedProgress.userAnswers;
                        secondsElapsed = savedProgress.secondsElapsed || 0;
                        initTest(false);
                    } else {
                        await startFreshTest();
                    }
                } else {
                    showSection('auth-section');
                }
            } catch (error) {
                console.error('Auth init error:', error);
                const errorDiv = document.getElementById('auth-error');
                errorDiv.textContent = error.message || 'Не удалось инициализировать тест';
                errorDiv.classList.remove('hidden');
                showSection('auth-section');
            }
        });

        window.addEventListener('beforeunload', (e) => {
            if (!document.getElementById('test-section').classList.contains('hidden')) {
                e.preventDefault();
                e.returnValue = '';
            }
        });
    </script>

</body></html>
